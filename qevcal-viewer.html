<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Android・iOS定期イベントカレンダー - Quest日本集会場</title>
  <link rel="stylesheet" href="reset.css" />
  <link href="qevcal-viewer.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p&display=swap" rel="stylesheet">
  <meta name="description" content="Android・iOS定期イベントカレンダーのビューワです。" />

</head>

<body>
  <header class="viewer-header">
    <div class="header-top">
      <a href="./"><img class="header-logo" src="queshulogo_vector.svg" alt="Quest日本集会場" /></a>
      <span class="header-title">Android・iOS対応</br>定期イベントカレンダー</span>
      <span class="update-info" id="updateInfo"></span>
    </div>
    <nav class="nav-buttons" id="navButtons" role="navigation" aria-label="表示切替">
      <button class="nav-btn active" data-view="daily">開催予定</button>
      <button class="nav-btn" data-view="0">日</button>
      <button class="nav-btn" data-view="1">月</button>
      <button class="nav-btn" data-view="2">火</button>
      <button class="nav-btn" data-view="3">水</button>
      <button class="nav-btn" data-view="4">木</button>
      <button class="nav-btn" data-view="5">金</button>
      <button class="nav-btn" data-view="6">土</button>
      <button class="nav-btn" data-view="none">その他</button>
    </nav>
  </header>

  <div class="controls">
    <span class="platform-label" id="platformLabel">プラットフォーム:</span>
    <div class="platform-toggles" id="platformToggles">
      <button class="toggle-btn active" id="toggleAndroid">Android</button>
      <button class="toggle-btn active" id="toggleIOS">iOS</button>
    </div>
    <input type="search" class="search-input" id="searchInput" placeholder="イベント名・主催者で検索…" autocomplete="off" />
    <div class="discord-link" id="discordLink"><a
        href="https://discord.gg/nGsTrKvbZv">イベント情報の応募・修正などは公式Discordサーバまで！</a>
    </div>
  </div>

  <div class="viewer-main">
    <div class="event-list-panel" id="eventListPanel" role="list">
      <div class="empty-state">読み込み中…</div>
    </div>

    <div class="detail-panel" id="detailPanel" role="complementary" aria-label="イベント詳細">
      <button class="detail-close-btn" id="detailCloseBtn" aria-label="閉じる">✕</button>
      <div class="detail-empty" id="detailEmpty">イベントを選択してください</div>
      <div id="detailContent" hidden></div>
    </div>
  </div>

  <script src="qevcal-viewer.js"></script>

</body>

</html>
