name: update-eventcalender

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: fetch json
        run: curl -L -o new.json https://script.google.com/macros/s/AKfycbxP3UepWrQIq730NWwUnItWtxeYue4fp-13JmmBQGS743uH0mtbz_Euja7qOwuHp46z/exec

      - name: compare ignoring updateAt
        id: diff
        run: |
          # updateAtを除去して比較用ファイル作成
          jq 'del(.updateAt)' new.json > new_clean.json

          if [ -f qevcal.json ]; then
            jq 'del(.updateAt)' qevcal.json > old_clean.json
          else
            echo '{}' > old_clean.json
          fi

          # 差分チェック
          if diff -q new_clean.json old_clean.json >/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: overwrite json
        if: steps.diff.outputs.changed == 'true'
        run: mv new.json qevcal.json

      - name: commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name queshu-admin
          git config user.email queshuofficial@gmail.com
          git add qevcal.json
          git commit -m "update qevcal.json"
          git push
